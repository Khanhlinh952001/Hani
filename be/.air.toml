root = "."
tmp_dir = "tmp"

[build]
pre_cmd = ["sh -c 'lsof -ti tcp:8080 | xargs kill -9 2>/dev/null || true'"]
cmd = "go build -o ./tmp/main ./cmd/api"
entrypoint = ["./tmp/main"]
include_ext = ["go", "tpl", "tmpl", "html"]
include_dir = ["cmd", "internal"]
include_file = ["go.mod", "go.sum", ".env"]
exclude_dir = ["tmp", "vendor"]
delay = 1000
stop_on_error = true

[log]
time = true
